name: CI

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Ruff
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Dependency audit (pip-audit)
        run: |
          pip-audit -r requirements/base.txt -r requirements/prod.txt

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2

  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: promaster
          POSTGRES_PASSWORD: promaster
          POSTGRES_DB: promaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U promaster -d promaster"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.tests
      TEST_DATABASE_URL: postgres://promaster:promaster@127.0.0.1:5432/promaster
      REDIS_URL: redis://127.0.0.1:6379/0
      RECAPTCHA_SKIP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Pytest
        run: pytest -q

