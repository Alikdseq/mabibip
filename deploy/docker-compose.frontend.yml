# Единая точка входа HTTP(S): Nginx → WSGI (web) и WebSocket → ASGI (asgi).
#
# Запуск (на сервере релиза):
#   docker compose -f docker-compose.yml -f deploy/docker-compose.frontend.yml up -d
#
# Порты:
#   NGINX_HTTP_PORT — снаружи (по умолчанию 8080; на VPS без другого веб-сервера поставьте 80).
#   При необходимости уберите публикацию портов у `web` и `asgi` (только внутренняя сеть).
#
# За Nginx с TLS: выставьте у сервисов `web` и `asgi` в .env:
#   USE_X_FORWARDED_HOST=1
#   SECURE_PROXY_SSL_HEADER=1
# (для config.settings.docker; в prod эти флаги уже по сути включены через prod.py)

services:
  nginx:
    image: nginx:1.26-alpine
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/docker-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      asgi:
        condition: service_started
    restart: unless-stopped
