# Nginx перед контейнерами `web` (Gunicorn) и `asgi` (Uvicorn) в одной Docker-сети.
# Подключение: docker compose -f docker-compose.yml -f deploy/docker-compose.frontend.yml up -d
#
# TLS: либо внешний прокси (Cloudflare, отдельный nginx на хосте) на этот порт,
# либо расширьте server блок ssl_listen и сертификатами (см. promaster.conf.example).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream promaster_wsgi {
    server web:8000;
    keepalive 32;
}

upstream promaster_asgi {
    server asgi:8001;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Согласовано с apps.classifieds.forms.AdForm (до 15 фото по 5 МБ)
    client_max_body_size 80m;

    # WebSocket (Django Channels): только ASGI
    location /ws/ {
        proxy_pass http://promaster_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://promaster_wsgi;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }
}
