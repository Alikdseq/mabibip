# ПроМастер: веб + PostgreSQL (PostGIS) + Redis. Запуск: docker compose up --build
# Сайт: http://127.0.0.1:8000/  Админка: http://127.0.0.1:8000/secure-admin/
# Релиз с одним входом HTTP и рабочими WebSocket: см. docs/DEPLOY-NGINX-PRODUCTION.md
#   docker compose -f docker-compose.yml -f deploy/docker-compose.frontend.yml up -d
# Утилиты Django (обход entrypoint, чтобы не дублировать migrate/collectstatic):
#   docker compose run --rm --entrypoint "" web python manage.py import_search_dictionary
#   docker compose run --rm --entrypoint "" web python manage.py createsuperuser
# С entrypoint (сам прогонит migrate + collectstatic + ваша команда):
#   docker compose run --rm web python manage.py createsuperuser

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promaster}
      POSTGRES_DB: ${POSTGRES_DB:-promaster}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promaster} -d ${POSTGRES_DB:-promaster}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command:
      [
        "gunicorn",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "2",
        "--timeout",
        "60",
        "--capture-output",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
        "config.wsgi:application",
      ]
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      # Ограничиваем число sync-воркеров gunicorn, иначе на мощном CPU Docker может поднять десятки воркеров,
      # что съедает RAM и даёт ощущение "всё медленно грузится".
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      DATABASE_URL: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-only-change-me-use-openssl-rand-hex-32}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,0.0.0.0}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DEBUG: ${DEBUG:-0}
      SITE_BASE_URL: ${SITE_BASE_URL:-http://127.0.0.1:8000}
      # SMTP (email verification / password reset). If EMAIL_HOST is set -> SMTP backend auto-enabled.
      EMAIL_BACKEND: ${EMAIL_BACKEND:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-20}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      # reCAPTCHA v3 (не храните секретный ключ в git)
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_VERSION: ${RECAPTCHA_VERSION:-v3}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-0.5}
      # Для локальной отладки можно отключить проверку на сервере:
      # RECAPTCHA_SKIP: ${RECAPTCHA_SKIP:-0}
    volumes:
      # Локальная разработка: монтируем репозиторий, чтобы `makemigrations` писал файлы в рабочую копию.
      - .:/app
      - media_data:/app/media
      # collectstatic пишет сюда; bind-mount на Windows часто ломает права на /app/staticfiles
      - staticfiles_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    entrypoint: [""]
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-only-change-me-use-openssl-rand-hex-32}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,0.0.0.0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    entrypoint: [""]
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-only-change-me-use-openssl-rand-hex-32}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,0.0.0.0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  asgi:
    build: .
    entrypoint: [""]
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8001 --workers ${UVICORN_WORKERS:-1}
    ports:
      - "${ASGI_PORT:-8001}:8001"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-docker-dev-only-change-me-use-openssl-rand-hex-32}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,asgi,0.0.0.0}
      DEBUG: ${DEBUG:-0}
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build: .
    entrypoint: ["python", "-m", "pytest", "-q"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.tests
      TEST_DATABASE_URL: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RECAPTCHA_SKIP: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # F10.1.4 Monitoring stack (optional): enable with `--profile monitoring`
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - node-exporter
      - postgres-exporter

  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./docker/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"

  node-exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:v1.8.1
    ports:
      - "127.0.0.1:9100:9100"

  postgres-exporter:
    profiles: ["monitoring"]
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgres://${POSTGRES_USER:-promaster}:${POSTGRES_PASSWORD:-promaster}@db:5432/${POSTGRES_DB:-promaster}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  staticfiles_data:
