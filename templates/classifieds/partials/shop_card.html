<div class="card h-100 border shadow-sm w-100">
  <div class="card-body d-flex flex-column">
    <div class="d-flex align-items-start justify-content-between gap-2">
      <div class="min-w-0">
        <div class="fw-semibold text-body text-truncate">{{ shop.name }}</div>
        <div class="small text-muted text-truncate">{{ shop.city_label|default:"" }}</div>
      </div>
      <span class="badge text-bg-light border flex-shrink-0">{{ shop.get_kind_display }}</span>
    </div>
    {% if shop.description %}
      <div class="small text-muted mt-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
        {{ shop.description }}
      </div>
    {% endif %}
    <div class="mt-3 d-flex gap-2 flex-wrap">
      <a class="btn btn-sm btn-primary" href="{% url 'classifieds:shop_detail' shop.slug %}">Открыть витрину</a>
      {% if shop.contact_phone %}
        <a class="btn btn-sm btn-outline-primary" href="tel:{{ shop.contact_phone }}">Позвонить</a>
      {% endif %}
    </div>
  </div>
</div>
