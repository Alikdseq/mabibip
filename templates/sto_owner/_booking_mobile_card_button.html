{# b: Booking; show_slot_date: bool #}
<button type="button"
        class="card border-0 shadow-sm text-start sto-booking-card js-booking-open {% if b.status == 'pending' %}border-warning border-2{% endif %}"
        data-bs-toggle="modal"
        data-bs-target="#bookingModal"
        data-booking-id="{{ b.pk }}"
        data-status="{{ b.status }}"
        data-time="{{ b.slot.start_time|time:'H:i' }}–{{ b.slot.end_time|time:'H:i' }}"
        data-bay="{{ b.slot.bay.name }}"
        data-phone="{{ b.contact_phone }}"
        data-email="{{ b.client.email|default:'' }}"
        data-car="{{ b.car_info|default:'' }}"
        data-desc="{{ b.description|default:'' }}"
        data-prior="{{ b.prior_completed_visits|default:0 }}"
        data-confirm-url="{% url 'sto_owner:booking_confirm' b.pk %}"
        data-reject-url="{% url 'sto_owner:booking_reject' b.pk %}"
        data-start-url="{% url 'sto_owner:booking_start' b.pk %}"
        data-complete-url="{% url 'sto_owner:booking_complete' b.pk %}">
  <div class="card-body py-3">
    <div class="d-flex align-items-start justify-content-between gap-2">
      <div class="min-w-0">
        {% if show_slot_date %}
          <div class="small text-muted mb-1">{{ b.slot.date|date:"d.m.Y" }}{% if b.station %} · {{ b.station.name }}{% endif %}</div>
        {% endif %}
        <div class="fw-semibold">{{ b.slot.start_time|time:"H:i" }}–{{ b.slot.end_time|time:"H:i" }}</div>
        <div class="small text-muted text-truncate">{{ b.contact_phone }}</div>
      </div>
      <div class="text-end flex-shrink-0">
        {% if b.status == 'pending' %}
          <span class="badge rounded-pill text-bg-warning">Новая</span>
        {% elif b.status == 'confirmed' %}
          <span class="badge rounded-pill text-bg-primary">Подтверждена</span>
        {% elif b.status == 'in_progress' %}
          <span class="badge rounded-pill text-bg-info">В работе</span>
        {% elif b.status == 'completed' %}
          <span class="badge rounded-pill text-bg-success">Завершено</span>
        {% elif b.status == 'canceled' %}
          <span class="badge rounded-pill text-bg-secondary">Отменено</span>
        {% else %}
          <span class="badge rounded-pill text-bg-secondary">{{ b.get_status_display }}</span>
        {% endif %}
      </div>
    </div>
    <div class="mt-2 small text-muted">
      <span class="me-2"><i class="bi bi-grid-1x2 me-1" aria-hidden="true"></i>{{ b.slot.bay.name }}</span>
      {% if b.prior_completed_visits %}
        <span class="badge text-bg-secondary">Повторный</span>
      {% else %}
        <span class="badge text-bg-light border text-muted">Первый</span>
      {% endif %}
    </div>
    {% if b.car_info or b.description %}
      <div class="mt-2 small">
        <div class="fw-medium text-truncate">{{ b.car_info }}</div>
        <div class="text-muted text-truncate">{{ b.description }}</div>
      </div>
    {% endif %}
  </div>
</button>
